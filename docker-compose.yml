services:
  version-monitor:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/version-monitor}:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: version-monitor
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      # - TZ=Asia/Shanghai
    restart: unless-stopped
